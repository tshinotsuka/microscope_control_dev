# vDAQ I/O map — microscope_control_dev
#
# 方式A: behavior/aux は vDAQ 低速 AI を ScanImage "Data Recorder" で HDF5 記録（同一 vDAQ クロック）。
#   injector イベントの t0 正本 = Data Recorder に録った injector TTL エッジ（AI7・全 scan モード共通・2026-06-04 決定）。
#   injector は acqModeStart 単発 UF (syncArmStart) で WG 'Trig Legato130'(D3.2) を発火 → AI7 で Data Recorder 記録。
#   Aux Trigger(D2.1 -> TIFF) は resonant 時の任意クロスチェックに格下げ（galvo は TIFF aux に依存しない）。
#   frame clock を D0.0 出力 -> T 分岐 -> AI6 ループバック(Data Recorder 記録) ＋ D2.2(WG Start Trigger 入力)。
#     ※ ALS でも D0.0 は cycle ごとに出る(branch A clock)。旧「ALS は frame 無」は誤りで修正済(2026-06-08)。
#   recorder-start ≠ frame-0（Auto-Start head pad ~2 s 実測 2026-06-05）のため、注入は frame_clock にアンカーする。
#   出力は Waveform Generator(FPGA タイミング)で駆動。User Function は acqModeStart で arm/start のみ（per-frame 禁止）。
#
#   [fixed-frame injection 機構・DoTask v4・PASS 2026-06-18] host timer(delaySec)は head_pad 可変で deterministic でない。
#     WG 案は廃止(WG は ALS 下で startTask->linePeriod が StimulusField で assert し arm 不安定・[sync] armed が false positive 化)。
#     → injector を D3.2 上の raw DoTask(dabs.vidrio.ddi.rdi.DoTask・finite)で駆動。linePeriod を呼ばず ALS 下で start 可。
#       start trigger = /vDAQ0/D2.2(rising) = D0.0 frame clock の T 分岐(D0.0 は vDAQgalvo 所有で外部 task が予約不可)。
#       syncArmStart が acqModeStart で auto-arm(createDoTask/addChannel/cfgSampClkTiming finite/cfgDigEdgeStartTrig/
#       writeOutputBuffer/start)・widget 手動 Start 不要。出力 buffer の N×cycle 位置に単発パルス(N=目標cycle-1・+1 オフセット)。
#       決定論 PASS: run-01_00002/00003/00004 で head_pad 1.15-2.23s ばらつきでも着弾 cycle 全て #501。150ms 単発 5.08V。
#
# 確定根拠: 公式 ScanImage vDAQ Wiring Diagram(IMG_9982) ＋ 実機 breakout 写真(IMG_9981)
#   ＋ ScanImage Resource Config ＋ 2026-06-05 galvo e2e bench（injector/frame_clock を実配線・実記録で confirmed）。
#   status: confirmed = 公式図/写真 or 実機ベンチで確認済み / proposed = 空きポートへの提案割当。
#
# DIO グループの向き制約(IMG_9982・重要):
#   D0 = Inputs/Outputs(双方向) / D1 = Inputs/Outputs(双方向)
#   D2 = Inputs Only           / D3 = Outputs Only
#   → 出力(injector/clock 等)は D0/D1/D3、入力(aux trigger 等)は D0/D1/D2。
#     D2.x を出力にはできない(D2.0 が Waveform Generator で選べなかった原因)。

vdaq:
  model: "Vidrio vDAQ (Kintex UltraScale, PCIe)"
  breakout: "AI x12 (AI0-11) / AO x12 (AO0-11) / DIO 4 groups D0-D3 x8 = 32 lines / +5V / knob"
  clock: "single vDAQ master clock(imaging と Data Recorder / Aux が同一クロック)"
  dio_groups:
    D0: "Inputs/Outputs"
    D1: "Inputs/Outputs"
    D2: "Inputs Only"
    D3: "Outputs Only"

# ---- 予約済み(標準配線で imaging/制御が使用・触らない) ----
# IMG_9982 の公式アサインに準拠。galvo 機で Pockels/Z/resonant を使わない場合は
# AI2/AI3・AO2-4・D2.0/D3.0 を再利用可(要・自分の構成での確認)。
reserved_imaging:
  - {port: "AI0",  signal: "X Galvo Feedback",        role: "scan_feedback", status: confirmed}
  - {port: "AI1",  signal: "Y Galvo Feedback",        role: "scan_feedback", status: confirmed}
  - {port: "AI2",  signal: "Power Feedback (Photodiode)", role: "beam_feedback", status: confirmed,
     note: "Pockels/ビーム power モニタ。未使用なら behavior に再利用可"}
  - {port: "AI3",  signal: "Z Feedback",              role: "z_feedback", status: confirmed,
     note: "FastZ 導入時に使用。未使用なら behavior に再利用可"}
  - {port: "AO0",  signal: "X Galvo Control",         role: "scan_control",  status: confirmed}
  - {port: "AO1",  signal: "Y Galvo Control",         role: "scan_control",  status: confirmed}
  - {port: "AO2",  signal: "Pockels Control",         role: "beam_control",  status: confirmed}
  - {port: "AO3",  signal: "Z control",               role: "z_control",     status: confirmed}
  - {port: "AO4",  signal: "Resonant Zoom",           role: "resonant",      status: confirmed,
     note: "galvo 機では未使用の可能性"}
  - {port: "D2.0", signal: "Resonant Sync",  role: "resonant", status: confirmed, note: "D2=Inputs Only"}
  - {port: "D3.0", signal: "Resonant Enable",role: "resonant", status: confirmed, note: "D3=Outputs Only"}
  - {port: "D3.1", signal: "Shutter (KSC101)", role: "shutter", status: confirmed,
     note: "Thorlabs KSC101。写真でも点灯確認"}

# ---- imaging 高速入力(この breakout ではなく PCIe 前面 SMB) ----
high_speed_ai:
  note: "PMT2100 x3 + 自作PD は前面 SMB(4ch 125 MS/s)。breakout の AIx ではない。要実機確認。"
  # HSAI0 PMT ch0 / HSAI1 PMT ch1 / HSAI2 custom_PD / HSAI3 PMT ch3 (overview.md より)

# ---- behavior(低速 AI -> Data Recorder, HDF5) ----
# AI0/AI1=galvo feedback, AI2=Power FB, AI3=Z FB(公式図)。AI6=frame_clock / AI7=injector(下の sync 章)。
# behavior は AI4,5,8+ に置く。(signal name = HDF5 dataset 名 / や空白不可)
low_speed_ai:
  recorder: "ScanImage Data Recorder"
  sample_rate_hz: 5000            # 2026-06-05 実機採用。実下限 3052 Hz(doc の 500 Hz でなく FPGA 分周由来)。上限 500 kHz。
  signals:
    - {port: "AI4", name: "velocity",   range_v: [-10, 10], role: "behavior", status: proposed,
       note: "treadmill。quadrature encoder の場合は AI でなく DI 2 本+offline decode か HARP に寄せる(Phase 2)"}
    - {port: "AI5", name: "lick",        range_v: [0, 5],   role: "behavior", status: proposed}
    - {port: "AI8", name: "reward_mon",  range_v: [0, 5],   role: "behavior", status: proposed,
       note: "報酬コマンドのモニタ(任意)。旧 AI6 から移動(AI6 は frame_clock に確定したため)"}
    # AI9-AI11 空き(behavior 追加用)

# ---- injector trigger chain (t0 mechanism finalized 2026-06-04; galvo confirmed 2026-06-05; DoTask v4 PASS 2026-06-18) ----
injector_trigger:   { port: D3.2, dir: out, role: "injector TTL out = raw DoTask (finite・acqModeStart auto-arm by syncArmStart)", status: confirmed,
                      driver: "dabs.vidrio.ddi.rdi.DoTask (Digital out, finite)",
                      start_trigger: "/vDAQ0/D2.2 (rising) = frame clock loopback",
                      note: "2026-06-18: WG 案は廃止(WG は ALS 下で startTask->linePeriod assert により arm 不安定)。raw DoTask は linePeriod を呼ばず ALS 下で start 可。決定論 PASS: run-01_00002/00003/00004 で head_pad 1.15-2.23s ばらつきでも着弾 cycle 全て #501。N=目標cycle-1(+1 オフセット)。実測 R=100kHz/nSamp=420000/~4.000s 遅延/150ms パルス。" }
injector_monitor:   { port: AI7,  dir: in,  role: "injector TTL -> Data Recorder 'Legato130_TTL' (t0 正本, 全モード共通)", status: confirmed }  # galvo/ALS 実機記録確認(run-01_00002..04 で 150ms 単発 5.08V)
injector_aux:       { port: D2.1, dir: in,  role: "Aux Trigger 1 (resonant 時の任意クロスチェックのみ・scanner Aux trigger 1 に loopback・無害)", status: confirmed }

# ---- frame clock chain (alignment cross-check; galvo confirmed 2026-06-05; D2.2 split 2026-06-12) ----
# recorder-start≠frame-0 のため、frame_clock を録って注入を frame アンカーする。
# D0.0(出力) を T 分岐: AI6(記録ループバック) ＋ D2.2(WG Start Trigger 入力)。
frame_clock_out:     { port: D0.0, dir: out, role: "imaging frame clock out (imaging system config > Triggers タブで D0.0 に割当・vDAQgalvo 所有)", status: confirmed }  # 旧 proposed D3.3 -> D0.0 に変更・使用
frame_clock_monitor: { port: AI6,  dir: in,  role: "frame clock -> Data Recorder 'frame_clock' (D0.0 ループバック)", status: confirmed,
                      note: "ALS でも cycle ごとに出る(branch A clock・各 cycle=内部 frame)。旧『ALS は frame 無』は誤りで修正済(2026-06-08)。" }
wg_trigger_in:       { port: D2.2, dir: in,  role: "injector DoTask の Start Trigger 入力 = D0.0 frame clock の T 分岐(2026-06-12 配線・2026-06-18 DoTask 化)", status: confirmed,
                      note: "D0.0 は vDAQgalvo 所有で外部 task が trigger に予約不可 → 物理 T 分岐で D2.2(D2=Inputs Only)へ。出力→入力なので T 分岐安全。DoTask の cfgDigEdgeStartTrig('/vDAQ0/D2.2','rising')。" }

# ---- frame-triggered 出力 = Route A: Waveform Generator ----
digital_out:
  - line: "D3.2"
    name: "injector_trigger"
    device: "Waveform Generator 'Trig Legato130'"
    role: "frame_triggered_out"
    status: confirmed
    driver: "raw DoTask (dabs.vidrio.ddi.rdi.DoTask・Digital out・finite)。2026-06-18: WG 廃止し DoTask v4 で deterministic fixed-cycle 化(PASS)。trig=/vDAQ0/D2.2(rising)。syncArmStart が acqModeStart で auto-arm・per-frame callback なし"
    note: "D3=Outputs Only。injector(KD Legato 130)へ＋ D2.1 aux に loopback(resonant cross-check)。D2.0 は入力専用で不可だった。DoTask: createDoTask/addChannel/cfgSampClkTiming(finite)/cfgDigEdgeStartTrig/writeOutputBuffer/start。"
  - line: "D0.0"
    name: "frame_clock_out"
    role: "sync_master"
    status: confirmed
    note: "frame clock を D0.0 に出力(imaging system config > Triggers タブ・vDAQgalvo 所有)。T 分岐: AI6 ループバック(Data Recorder 記録・整列) ＋ D2.2(WG Start Trigger 入力・2026-06-12)。Phase2 で pupil camera/ephys へも同線。旧 D3.3 提案は解放。"
  # 将来 opto 用に D3.3-D3.7 等(出力)を確保

# ---- Auxiliary Trigger 入力(イベントを TIFF に timestamp) ----
aux_trigger_in:
  note: "FPGA・8 ns 分解能で TIFF header に timestamp。doc 上 resonant 限定 -> galvo/ALS では t0 に使わず resonant 時の任意クロスチェックのみ。"
  lines:
    - {port: "D2.1", name: "injector_aux", role: "timestamp", status: proposed,
       source: "D3.2(injector_trigger) を BNC ジャンパで loopback",
       note: "D2=Inputs Only で aux 入力に好適。resonant 時のみ真値クロスチェック(galvo の t0 は AI7=Data Recorder が正)"}
    # 他イベント(reward pulse / 視覚刺激 onset の photodiode 等)も D2.x(入力)か Data Recorder DI へ

# ---- 空き(向き制約つき) ----
free_ports:
  analog_out: "AO5-AO11"
  analog_in:  "AI9-AI11 (＋未使用なら AI2/AI3)"   # AI6=frame_clock, AI7=injector, AI8=reward_mon に割当済
  digital_out_capable: "D0.1-D0.7 / D1.x(双方向) / D3.3-D3.7(出力専用・D3.2=injector 使用中)"
  digital_in_capable:  "D0.x(D0.0 除く) / D1.x(双方向) / D2.3-D2.7(入力専用・D2.0/D2.1/D2.2 使用中)"   # D2.2=WG Start Trigger(frame clock 分岐・2026-06-12)

# ---- fallback(方式B・別 NI ボード) ----
fallback_method_b:
  device: "別 NI ボード + BehaviorAcquisition.m(daq.createSession('ni'))"
  status: "保持(未使用)。方式A が要件を満たさない場合のみ"
  note: "vDAQ を別 session で握ると ScanImage と排他衝突(過去の DO 不動の原因)。vDAQ 上では使わない"

provenance:
  status: "reserved/向き制約は公式図 confirmed。injector(D3.2/AI7)・frame_clock(D0.0/AI6) は 2026-06-05 galvo bench で confirmed。behavior は proposed(実配線で確定)。"
  refs:
    - "IMG_9982(公式 ScanImage vDAQ Wiring Diagram)"
    - "IMG_9981(breakout 実機写真)"
    - "2026-06-05 galvo e2e bench(injector AI7 t0・frame_clock D0.0->AI6 を実記録で確認; method_a_e2e_gonogo_sop.md)"
    - "2026-06-12 fixed-frame bench(WG 'Trig Legato130' を frame clock で trigger・D0.0->D2.2 分岐・widget arm 必須を確認; run-06_00005/00007 で AI7 clean 単発記録・検証残)"
    - "2026-06-18 fixed-frame PASS(WG 廃止し D3.2 raw DoTask v4・trig D2.2・syncArmStart auto-arm; run-01_00002/00003/00004 で head_pad 1.15-2.23s ばらつきでも着弾 cycle 全て #501=決定論成立・150ms 単発 5.08V)"
    - "docs.scanimage.org: Data Recorder / Auxiliary Trigger / Waveform Generator / Stage Scanning(frame clock 出力)"
    - "docs/status.md §3/§3.5(方式A) / sync_architecture.md §2-§3 / trigger_sync.schema.json"
